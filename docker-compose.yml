version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Порт для тесту береться зі змінних, за замовчуванням 8080
    ports:
      - '8080:3000'
    container_name: app
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME:-db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-MyPassword05}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?schema=public
      - TMDB_API_KEY=${TMDB_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    depends_on:
      db:
        # App почне запуск ТІЛЬКИ коли healthcheck бази даних скаже "ready"
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js && exec node dist/src/main.js"

  db:
    image: postgres:15-alpine
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-MyPassword05}
      POSTGRES_DB: ${DB_NAME:-db}
    ports:
      - '5433:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
