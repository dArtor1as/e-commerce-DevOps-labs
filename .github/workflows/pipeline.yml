name: Lab 2 Pipeline

on:
  push:
  workflow_dispatch:

# Надаємо права GITHUB_TOKEN для публікації пакетів у GHCR
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ecommerce-app

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Докер вимагає, щоб назви образів були виключно в lowercase.
      # Тому перетворюємо назву репозиторію до нижнього регістру і зберігаємо у змінну середовища OWNER_LC
      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Цей Action автоматично генерує правильні теги (latest та sha-xxxxxxx)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/ecommerce-app
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Перевірка безпеки за допомогою Trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.OWNER_LC }}/ecommerce-app:latest'
          format: 'table'
          # Не зупиняємо пайплайн, якщо знайдені вразливості (тільки показуємо звіт)
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'

      # Фінальний крок: запуск валідаційного скрипта викладача
      - name: Run Master Validation Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./tests/lab2_test.sh
          ./tests/lab2_test.sh
